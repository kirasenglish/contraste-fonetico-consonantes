<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consonant Mastery | Kira's English</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        body { margin: 0; padding: 0; background-color: #000; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: white; }
        .action-card { background: #000; border-left: 8px solid #D30000; border-radius: 12px; padding: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); width: 95%; max-width: 900px; box-sizing: border-box; }
        .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; }
        .header-title-container { display: flex; align-items: center; gap: 15px; border-bottom: 3px solid #D30000; padding-bottom: 12px; }
        .header-title-container span { color: #ffffff; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; }
        .logo-bracket { width: 50px; height: 50px; background: #000; border-left: 4px solid #D30000; border-radius: 6px; display: flex; align-items: center; justify-content: center; padding-left: 6px; }
        .logo-bracket img { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; }
        #counter { font-size: 1.1rem; font-weight: 700; padding-bottom: 12px; color: #D30000; white-space: nowrap; margin-left: 20px;}
        .progress-container { width: 100%; background: #222; height: 10px; border-radius: 5px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar { height: 100%; background: #D30000; width: 0%; transition: width 0.4s ease; }
        .exercise-block { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .pair-grid { display: flex; gap: 20px; margin-bottom: 25px; }
        .word-box { flex: 1; background: #1a1a1a; padding: 30px 15px; border-radius: 12px; border: 3px solid #333; transition: 0.2s; }
        .word-box.active { border-color: #00FF00; background: #0a250a; transform: scale(1.05); }
        .word-text, .ipa-text { font-size: 2.2rem; font-weight: 700; display: block; margin-bottom: 8px; }
        .ipa-text { color: #D30000; }
        .translation-small { font-size: 1.1rem; color: #888; font-style: italic; margin-top: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .blur { filter: blur(4px); opacity: 0.6; }
        button { width: 100%; max-width: 400px; padding: 20px; border-radius: 10px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-family: 'Montserrat', sans-serif; font-size: 1.1rem; margin: 10px auto; border: none; transition: 0.2s; display: block; }
        .btn-speak { background: #D30000; color: white; box-shadow: 0 4px 15px rgba(211, 0, 0, 0.3); }
        .btn-next { background: #00FF00; color: #000; margin-top: 15px; }
        .btn-skip { background: transparent; color: #555; border: 1px solid #222; font-size: 0.8rem; }
        #feedback { margin-top: 15px; min-height: 45px; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; justify-content: center; text-align: center; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0px 0px rgba(211, 0, 0, 0.7); } 70% { box-shadow: 0 0 0px 20px rgba(211, 0, 0, 0); } 100% { box-shadow: 0 0 0px 0px rgba(211, 0, 0, 0); } }
        .listening-active { animation: pulse-red 1.5s infinite; background-color: #ff0000 !important; }
        .hidden { display: none; }
        @media (max-width: 600px) { .word-text, .ipa-text { font-size: 1.5rem; } .pair-grid { flex-direction: column; } .logo-bracket { width: 35px; height: 35px; } .logo-bracket img { width: 30px; height: 30px; } #counter { margin-left: 10px; font-size: 0.9rem; } }
    </style>
</head>
<body>

<div class="action-card">
    <div class="section-header">
        <div class="header-title-container">
            <div class="logo-bracket"><img src="https://drive.google.com/thumbnail?id=1DQWHMZf7MpnzZBa3CbqqyJGLQEK6U4lZ" alt="Kira"></div>
            <span>Consonant Mastery</span>
        </div>
        <span id="counter">1 / 65</span>
    </div>
    <div class="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
    <div id="quiz-area">
        <div class="exercise-block">
            <div class="pair-grid">
                <div class="word-box" id="box1"><span class="word-text" id="w1"></span><span class="ipa-text" id="ipa1"></span><div class="translation-small blur" id="s1" onclick="this.classList.toggle('blur')"></div></div>
                <div class="word-box" id="box2"><span class="word-text" id="w2"></span><span class="ipa-text" id="ipa2"></span><div class="translation-small blur" id="s2" onclick="this.classList.toggle('blur')"></div></div>
            </div>
            <button class="btn-speak" id="mic" onclick="start()">Presiona y Habla 🎤</button>
            <div id="feedback">Pronuncia AMBAS palabras para continuar.</div>
            <button id="next" class="btn-next hidden" onclick="go()">Siguiente Par ➔</button>
            <button id="skip" class="btn-skip" onclick="go()">Saltar</button>
        </div>
    </div>
</div>

<script>
    const data = [
        /* V vs B */
        { a: "very", b: "berry", ipaA: "/ˈver.i/", ipaB: "/ˈber.i/", sA: "Muy", sB: "Baya" },
        { a: "vote", b: "boat", ipaA: "/voʊt/", ipaB: "/boʊt/", sA: "Voto", sB: "Bote" },
        { a: "vest", b: "best", ipaA: "/vest/", ipaB: "/best/", sA: "Chaleco", sB: "Mejor" },
        { a: "vase", b: "base", ipaA: "/veɪs/", ipaB: "/beɪs/", sA: "Florero", sB: "Base" },
        { a: "van", b: "ban", ipaA: "/væn/", ipaB: "/bæn/", sA: "Furgoneta", sB: "Prohibición" },
        /* TH vs D */
        { a: "they", b: "day", ipaA: "/ðeɪ/", ipaB: "/deɪ/", sA: "Ellos", sB: "Día" },
        { a: "there", b: "dare", ipaA: "/ðer/", ipaB: "/der/", sA: "Allá", sB: "Atreverse" },
        { a: "then", b: "den", ipaA: "/ðen/", ipaB: "/den/", sA: "Entonces", sB: "Guarida" },
        { a: "though", b: "dough", ipaA: "/ðoʊ/", ipaB: "/doʊ/", sA: "Aunque", sB: "Masa" },
        { a: "breathe", b: "breed", ipaA: "/briːð/", ipaB: "/briːd/", sA: "Respirar", sB: "Raza" },
        /* Z vs S */
        { a: "prize", b: "price", ipaA: "/praɪz/", ipaB: "/praɪs/", sA: "Premio", sB: "Precio" },
        { a: "phase", b: "face", ipaA: "/feɪz/", ipaB: "/feɪs/", sA: "Fase", sB: "Cara" },
        { a: "eyes", b: "ice", ipaA: "/aɪz/", ipaB: "/aɪs/", sA: "Ojos", sB: "Hielo" },
        { a: "buzz", b: "bus", ipaA: "/bʌz/", ipaB: "/bʌs/", sA: "Zumbido", sB: "Autobús" },
        { a: "zip", b: "sip", ipaA: "/zɪp/", ipaB: "/sɪp/", sA: "Cierre", sB: "Sorbito" },
        /* J vs Y */
        { a: "jet", b: "yet", ipaA: "/dʒet/", ipaB: "/jet/", sA: "Avión", sB: "Todavía" },
        { a: "job", b: "yob", ipaA: "/dʒɑːb/", ipaB: "/jɑːb/", sA: "Trabajo", sB: "Vándalo" },
        { a: "juice", b: "use", ipaA: "/dʒuːs/", ipaB: "/juːs/", sA: "Jugo", sB: "Uso" },
        { a: "joke", b: "yoke", ipaA: "/dʒoʊk/", ipaB: "/joʊk/", sA: "Broma", sB: "Yugo" },
        { a: "jello", b: "yellow", ipaA: "/ˈdʒel.oʊ/", ipaB: "/ˈjel.oʊ/", sA: "Gelatina", sB: "Amarillo" },
        /* SH vs CH */
        { a: "share", b: "chair", ipaA: "/ʃer/", ipaB: "/tʃer/", sA: "Compartir", sB: "Silla" },
        { a: "ship", b: "chip", ipaA: "/ʃɪp/", ipaB: "/tʃɪp/", sA: "Barco", sB: "Fritura" },
        { a: "wash", b: "watch", ipaA: "/wɑːʃ/", ipaB: "/wɑːtʃ/", sA: "Lavar", sB: "Reloj" },
        { a: "shoes", b: "choose", ipaA: "/ʃuːz/", ipaB: "/tʃuːz/", sA: "Zapatos", sB: "Elegir" },
        { a: "cash", b: "catch", ipaA: "/kæʃ/", ipaB: "/kætʃ/", sA: "Efectivo", sB: "Atrapar" },
        /* NG vs NK */
        { a: "sing", b: "sink", ipaA: "/sɪŋ/", ipaB: "/sɪŋk/", sA: "Cantar", sB: "Lavaplatos" },
        { a: "king", b: "kink", ipaA: "/kɪŋ/", ipaB: "/kɪŋk/", sA: "Rey", sB: "Nudo/Curva" },
        { a: "song", b: "sunk", ipaA: "/sɔːŋ/", ipaB: "/sʌŋk/", sA: "Canción", sB: "Hundido" },
        { a: "rung", b: "runk", ipaA: "/rʌŋ/", ipaB: "/rʌŋk/", sA: "Peldaño", sB: "Runk" },
        { a: "long", b: "lonk", ipaA: "/lɔːŋ/", ipaB: "/lɔːŋk/", sA: "Largo", sB: "Lonk" },
        { a: "thing", b: "think", ipaA: "/θɪŋ/", ipaB: "/θɪŋk/", sA: "Cosa", sB: "Pensar" },
        { a: "working", b: "work ink", ipaA: "/ˈwɝː.kɪŋ/", ipaB: "/wɝːk ɪŋk/", sA: "Trabajando", sB: "Tinta de trabajo" },
        /* TH(soft) vs Z */
        { a: "thaw", b: "zoo", ipaA: "/θɔː/", ipaB: "/zuː/", sA: "Descongelar", sB: "Zoológico" },
        { a: "thin", b: "zing", ipaA: "/θɪn/", ipaB: "/zɪŋ/", sA: "Delgado", sB: "Energía" },
        { a: "math", b: "maze", ipaA: "/mæθ/", ipaB: "/meɪz/", sA: "Mates", sB: "Laberinto" },
        { a: "faith", b: "faze", ipaA: "/feɪθ/", ipaB: "/feɪz/", sA: "Fe", sB: "Faze" },
        { a: "death", b: "does", ipaA: "/deθ/", ipaB: "/dʌz/", sA: "Muerte", sB: "Hace" },
        /* ZH vs SH */
        { a: "pleasure", b: "pressure", ipaA: "/ˈpleʒ.ɚ/", ipaB: "/ˈpreʃ.ɚ/", sA: "Placer", sB: "Presión" },
        { a: "vision", b: "fission", ipaA: "/ˈvɪʒ.ən/", ipaB: "/ˈfɪʃ.ən/", sA: "Visión", sB: "Fisión" },
        { a: "measure", b: "mesher", ipaA: "/ˈmeʒ.ɚ/", ipaB: "/ˈmeʃ.ɚ/", sA: "Medida", sB: "Enrejador" },
        { a: "confusion", b: "confession", ipaA: "/kənˈfjuː.ʒən/", ipaB: "/kənˈfeʃ.ən/", sA: "Confusión", sB: "Confesión" },
        { a: "casual", b: "cashier", ipaA: "/ˈkæʒ.u.əl/", ipaB: "/kæˈʃɪr/", sA: "Casual", sB: "Cajero" },
        /* M vs N Final */
        { a: "dam", b: "dan", ipaA: "/dæm/", ipaB: "/dæn/", sA: "Represa", sB: "Dan" },
        { a: "team", b: "teen", ipaA: "/tiːm/", ipaB: "/tiːn/", sA: "Equipo", sB: "Adolescente" },
        { a: "gum", b: "gun", ipaA: "/ɡʌm/", ipaB: "/ɡʌn/", sA: "Chicle", sB: "Pistola" },
        { a: "beam", b: "been", ipaA: "/biːm/", ipaB: "/biːn/", sA: "Rayo", sB: "Sido" },
        { a: "rim", b: "rin", ipaA: "/rɪm/", ipaB: "/rɪn/", sA: "Borde", sB: "Rin" },
        { a: "sum", b: "sun", ipaA: "/sʌm/", ipaB: "/sʌn/", sA: "Suma", sB: "Sol" },
        { a: "warm", b: "warn", ipaA: "/wɔːrm/", ipaB: "/wɔːrn/", sA: "Cálido", sB: "Advertir" },
        { a: "room", b: "rune", ipaA: "/ruːm/", ipaB: "/ruːn/", sA: "Cuarto", sB: "Runa" },
        /* T vs D Final */
        { a: "mat", b: "mad", ipaA: "/mæt/", ipaB: "/mæd/", sA: "Tapete", sB: "Enojado" },
        { a: "bat", b: "bad", ipaA: "/bæt/", ipaB: "/bæd/", sA: "Bate", sB: "Malo" },
        { a: "hat", b: "had", ipaA: "/hæt/", ipaB: "/hæd/", sA: "Sombrero", sB: "Tenía" },
        { a: "seat", b: "seed", ipaA: "/siːt/", ipaB: "/siːd/", sA: "Asiento", sB: "Semilla" },
        { a: "bent", b: "bend", ipaA: "/bent/", ipaB: "/bend/", sA: "Doblado", sB: "Doblar" },
        { a: "cart", b: "card", ipaA: "/kɑːrt/", ipaB: "/kɑːrd/", sA: "Carrito", sB: "Tarjeta" },
        { a: "sent", b: "send", ipaA: "/sent/", ipaB: "/send/", sA: "Enviado", sB: "Enviar" },
        { a: "write", b: "ride", ipaA: "/raɪt/", ipaB: "/raɪd/", sA: "Escribir", sB: "Montar" },
        /* N vs ND Final */
        { a: "han", b: "hand", ipaA: "/hæn/", ipaB: "/hænd/", sA: "Han", sB: "Mano" },
        { a: "mine", b: "mind", ipaA: "/maɪn/", ipaB: "/maɪnd/", sA: "Mío", sB: "Mente" },
        { a: "kine", b: "kind", ipaA: "/kaɪn/", ipaB: "/kaɪnd/", sA: "Ganado", sB: "Amable" },
        { a: "sun", b: "sand", ipaA: "/sʌn/", ipaB: "/sænd/", sA: "Sol", sB: "Arena" },
        { a: "ban", b: "band", ipaA: "/bæn/", ipaB: "/bænd/", sA: "Prohibir", sB: "Banda" },
        { a: "fine", b: "find", ipaA: "/faɪn/", ipaB: "/faɪnd/", sA: "Bien", sB: "Encontrar" }
    ];

    const variants = { "berry": ["barry", "bury"], "very": ["berry", "bury"], "mad": ["matt"], "bad": ["bat"], "ride": ["died"], "team": ["teen"], "gum": ["gun"], "sing": ["sink"], "thing": ["think"], "last": ["lass"], "mind": ["mine"], "sand": ["sun", "send"] };
    let idx = 0, doneA = false, doneB = false;
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = Recognition ? new Recognition() : null;
    if(rec) { rec.lang = 'en-US'; rec.continuous = false; }

    function updateCard() {
        document.getElementById('w1').innerText = data[idx].a;
        document.getElementById('w2').innerText = data[idx].b;
        document.getElementById('ipa1').innerText = data[idx].ipaA;
        document.getElementById('ipa2').innerText = data[idx].ipaB;
        document.getElementById('s1').innerText = data[idx].sA;
        document.getElementById('s2').innerText = data[idx].sB;
        document.getElementById('s1').classList.add('blur');
        document.getElementById('s2').classList.add('blur');
        document.getElementById('box1').classList.remove('active');
        document.getElementById('box2').classList.remove('active');
        document.getElementById('counter').innerText = `${idx + 1} / ${data.length}`;
        document.getElementById('progress-bar').style.width = `${((idx + 1) / data.length) * 100}%`;
        document.getElementById('next').classList.add('hidden');
        document.getElementById('skip').classList.remove('hidden');
        doneA = false; doneB = false;
    }

    function start() {
        if (!rec) return alert("Micro no compatible.");
        try { rec.start(); } catch(e) {}
        document.getElementById('mic').classList.add('listening-active');
        document.getElementById('mic').innerText = "Escuchando... 🎤";
    }

    rec.onresult = (e) => {
        const heard = e.results[0][0].transcript.toLowerCase().trim();
        const wordA = data[idx].a.toLowerCase(), wordB = data[idx].b.toLowerCase();
        const fb = document.getElementById('feedback');
        const checkMatch = (input, target) => {
            if (input.includes(target)) return true;
            if (variants[target] && variants[target].some(v => input.includes(v))) return true;
            return false;
        };
        if (checkMatch(heard, wordA)) { document.getElementById('box1').classList.add('active'); doneA = true; }
        else if (checkMatch(heard, wordB)) { document.getElementById('box2').classList.add('active'); doneB = true; }
        else { fb.innerHTML = `<span style="color:#D30000">"${heard}"?</span>`; }
        if (doneA && doneB) {
            fb.innerHTML = `<span style="color:#00FF00">¡LOGRADO! ✅</span>`;
            document.getElementById('next').classList.remove('hidden');
            document.getElementById('skip').classList.add('hidden');
        }
    };

    rec.onend = () => { document.getElementById('mic').classList.remove('listening-active'); document.getElementById('mic').innerText = "Presiona y Habla 🎤"; };
    function go() { idx++; if (idx < data.length) updateCard(); else document.getElementById('quiz-area').innerHTML = `<h2 style="color:#00FF00">¡RETO COMPLETADO!</h2><button onclick="location.reload()">REINICIAR</button>`; }
    updateCard();
</script>
</body>
</html>
