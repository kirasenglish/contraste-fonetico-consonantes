<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consonant Mastery | Kira's English</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #000; 
            font-family: 'Montserrat', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            color: white; 
        }
        
        .action-card { 
            background: #000; 
            border-left: 6px solid #D30000; 
            border-radius: 12px; 
            padding: 40px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.9); 
            width: 98%; 
            max-width: 1200px; 
            min-height: 95vh; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box; 
            margin: 10px;
        }
        
        /* Cabecera con Logo integrado antes del texto */
        .section-header { 
            color: #ffffff; 
            font-size: 1.2rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            border-bottom: 3px solid #D30000; 
            padding-bottom: 15px; 
            margin-bottom: 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .header-title-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #D30000;
        }

        .progress-container { width: 100%; background: #222; height: 12px; border-radius: 6px; margin-bottom: 40px; overflow: hidden; }
        .progress-bar { height: 100%; background: #D30000; width: 0%; transition: width 0.4s ease; }
        
        #quiz-area { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        
        .exercise-block { background: #111; padding: 50px 30px; border-radius: 20px; border: 1px solid #222; text-align: center; }
        
        .pair-grid { display: flex; gap: 20px; margin-bottom: 40px; }

        .word-box { 
            flex: 1; 
            background: #1a1a1a; 
            padding: 40px 20px; 
            border-radius: 15px; 
            border: 3px solid #333; 
            transition: 0.3s; 
        }

        .word-box.active { border-color: #00FF00; background: #0a250a; transform: scale(1.05); }
        
        /* Palabras y Fonemas: Mismo tamaño y Bold */
        .word-text { font-size: clamp(1.5rem, 5vw, 3rem); font-weight: 700; display: block; margin-bottom: 10px; }
        .ipa-text { color: #D30000; font-size: clamp(1.5rem, 5vw, 3rem); font-weight: 700; display: block; margin-bottom: 10px; }
        
        .translation-small { font-size: 1.1rem; color: #888; font-style: italic; margin-top: 15px; cursor: pointer; transition: 0.3s; }
        .blur { filter: blur(3.5px); opacity: 0.7; }
        
        button { 
            width: 100%; 
            max-width: 600px; 
            margin: 15px auto; 
            padding: 25px; 
            border-radius: 12px; 
            font-weight: 700; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-family: 'Montserrat', sans-serif; 
            font-size: 1.2rem; 
            border: none; 
            transition: 0.3s; 
            display: block;
        }

        .btn-speak { background: #D30000; color: white; box-shadow: 0 6px 20px rgba(211, 0, 0, 0.4); }
        .btn-next { background: #00FF00; color: #000; margin-top: 30px; }
        .btn-skip { background: transparent; color: #666; border: 1px solid #333; font-size: 0.9rem; padding: 15px; }
        
        #feedback { margin-top: 25px; min-height: 60px; font-size: 1.2rem; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; justify-content: center; text-align: center; }
        
        @keyframes pulse-red { 0% { box-shadow: 0 0 0px 0px rgba(211, 0, 0, 0.7); } 70% { box-shadow: 0 0 0px 30px rgba(211, 0, 0, 0); } 100% { box-shadow: 0 0 0px 0px rgba(211, 0, 0, 0); } }
        .listening-active { animation: pulse-red 1.5s infinite; background-color: #ff0000 !important; }
        .hidden { display: none; }

        @media (max-width: 768px) {
            .action-card { padding: 20px; min-height: 98vh; }
            .pair-grid { flex-direction: column; gap: 15px; }
            .header-logo { width: 35px; height: 35px; }
        }
    </style>
</head>
<body>

<div class="action-card">
    <div class="section-header">
        <div class="header-title-area">
            <img src="https://lh3.googleusercontent.com/d/1DQWHMZf7MpnzZBa3CbqqyJGLQEK6U4lZ" class="header-logo" alt="Logo">
            <span>Consonant Mastery</span>
        </div>
        <span id="counter" style="color: #D30000;">1 / 45</span>
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div id="quiz-area">
        <div class="exercise-block">
            <p style="font-size: 0.9rem; color: #888; margin-top: 0; text-transform: uppercase;">Pronuncia uno de los dos:</p>
            <div class="pair-grid">
                <div class="word-box" id="box1">
                    <span class="word-text" id="w1">Very</span>
                    <span class="ipa-text" id="ipa1">/ˈver.i/</span>
                    <div class="translation-small blur" id="s1" onclick="this.classList.toggle('blur')">Muy</div>
                </div>
                <div class="word-box" id="box2">
                    <span class="word-text" id="w2">Berry</span>
                    <span class="ipa-text" id="ipa2">/ˈber.i/</span>
                    <div class="translation-small blur" id="s2" onclick="this.classList.toggle('blur')">Baya</div>
                </div>
            </div>
            <button class="btn-speak" id="mic" onclick="start()">Presiona y Habla 🎤</button>
            <div id="feedback">Listo para escuchar.</div>
            <button id="next" class="btn-next hidden" onclick="go()">Siguiente Par ➔</button>
            <button id="skip" class="btn-skip" onclick="go()">Saltar Par</button>
        </div>
    </div>
</div>

<script>
    const data = [
        { a: "very", b: "berry", ipaA: "/ˈver.i/", ipaB: "/ˈber.i/", sA: "Muy", sB: "Baya" },
        { a: "vote", b: "boat", ipaA: "/voʊt/", ipaB: "/boʊt/", sA: "Voto", sB: "Bote" },
        { a: "vest", b: "best", ipaA: "/vest/", ipaB: "/best/", sA: "Chaleco", sB: "Mejor" },
        { a: "vase", b: "base", ipaA: "/veɪs/", ipaB: "/beɪs/", sA: "Florero", sB: "Base" },
        { a: "van", b: "ban", ipaA: "/væn/", ipaB: "/bæn/", sA: "Furgoneta", sB: "Prohibición" },
        { a: "they", b: "day", ipaA: "/ðeɪ/", ipaB: "/deɪ/", sA: "Ellos", sB: "Día" },
        { a: "there", b: "dare", ipaA: "/ðer/", ipaB: "/der/", sA: "Allá", sB: "Atreverse" },
        { a: "then", b: "den", ipaA: "/ðen/", ipaB: "/den/", sA: "Entonces", sB: "Guarida" },
        { a: "though", b: "dough", ipaA: "/ðoʊ/", ipaB: "/doʊ/", sA: "Aunque", sB: "Masa" },
        { a: "breathe", b: "breed", ipaA: "/briːð/", ipaB: "/briːd/", sA: "Respirar", sB: "Raza" },
        { a: "prize", b: "price", ipaA: "/praɪz/", ipaB: "/praɪs/", sA: "Premio", sB: "Precio" },
        { a: "phase", b: "face", ipaA: "/feɪz/", ipaB: "/feɪs/", sA: "Fase", sB: "Cara" },
        { a: "eyes", b: "ice", ipaA: "/aɪz/", ipaB: "/aɪs/", sA: "Ojos", sB: "Hielo" },
        { a: "buzz", b: "bus", ipaA: "/bʌz/", ipaB: "/bʌs/", sA: "Zumbido", sB: "Autobús" },
        { a: "zip", b: "sip", ipaA: "/zɪp/", ipaB: "/sɪp/", sA: "Cierre", sB: "Sorbito" },
        { a: "jet", b: "yet", ipaA: "/dʒet/", ipaB: "/jet/", sA: "Avión", sB: "Todavía" },
        { a: "job", b: "yob", ipaA: "/dʒɑːb/", ipaB: "/jɑːb/", sA: "Trabajo", sB: "Vándalo" },
        { a: "juice", b: "use", ipaA: "/dʒuːs/", ipaB: "/juːs/", sA: "Jugo", sB: "Uso" },
        { a: "joke", b: "yoke", ipaA: "/dʒoʊk/", ipaB: "/joʊk/", sA: "Broma", sB: "Yugo" },
        { a: "jello", b: "yellow", ipaA: "/ˈdʒel.oʊ/", ipaB: "/ˈjel.oʊ/", sA: "Gelatina", sB: "Amarillo" },
        { a: "share", b: "chair", ipaA: "/ʃer/", ipaB: "/tʃer/", sA: "Compartir", sB: "Silla" },
        { a: "ship", b: "chip", ipaA: "/ʃɪp/", ipaB: "/tʃɪp/", sA: "Barco", sB: "Papita" },
        { a: "wash", b: "watch", ipaA: "/wɑːʃ/", ipaB: "/wɑːtʃ/", sA: "Lavar", sB: "Ver/Reloj" },
        { a: "shoes", b: "choose", ipaA: "/ʃuːz/", ipaB: "/tʃuːz/", sA: "Zapatos", sB: "Elegir" },
        { a: "cash", b: "catch", ipaA: "/kæʃ/", ipaB: "/kætʃ/", sA: "Efectivo", sB: "Atrapar" },
        { a: "sing", b: "sink", ipaA: "/sɪŋ/", ipaB: "/sɪŋk/", sA: "Cantar", sB: "Hundirse" },
        { a: "thing", b: "think", ipaA: "/θɪŋ/", ipaB: "/θɪŋk/", sA: "Cosa", sB: "Pensar" },
        { a: "wing", b: "wink", ipaA: "/wɪŋ/", ipaB: "/wɪŋk/", sA: "Ala", sB: "Guiño" },
        { a: "bang", b: "bank", ipaA: "/bæŋ/", ipaB: "/bæŋk/", sA: "Golpe", sB: "Banco" },
        { a: "ring", b: "rink", ipaA: "/rɪŋ/", ipaB: "/rɪŋk/", sA: "Anillo", sB: "Pista" },
        { a: "thaw", b: "zoo", ipaA: "/θɔː/", ipaB: "/zuː/", sA: "Descongelar", sB: "Zoológico" },
        { a: "thin", b: "zing", ipaA: "/θɪn/", ipaB: "/zɪŋ/", sA: "Delgado", sB: "Energía" },
        { a: "math", b: "maze", ipaA: "/mæθ/", ipaB: "/meɪz/", sA: "Mates", sB: "Laberinto" },
        { a: "faith", b: "faze", ipaA: "/feɪθ/", ipaB: "/feɪz/", sA: "Fe", sB: "Inquietar" },
        { a: "death", b: "does", ipaA: "/deθ/", ipaB: "/dʌz/", sA: "Muerte", sB: "Hace" },
        { a: "pleasure", b: "pressure", ipaA: "/ˈpleʒ.ɚ/", ipaB: "/ˈpreʃ.ɚ/", sA: "Placer", sB: "Presión" },
        { a: "vision", b: "fission", ipaA: "/ˈvɪʒ.ən/", ipaB: "/ˈfɪʃ.ən/", sA: "Visión", sB: "Fisión" },
        { a: "measure", b: "mesher", ipaA: "/ˈmeʒ.ɚ/", ipaB: "/ˈmeʃ.ɚ/", sA: "Medida", sB: "Enrejador" },
        { a: "confusion", b: "confession", ipaA: "/kənˈfjuː.ʒən/", ipaB: "/kənˈfeʃ.ən/", sA: "Confusión", sB: "Confesión" },
        { a: "casual", b: "cashier", ipaA: "/ˈkæʒ.u.əl/", ipaB: "/kæˈʃɪr/", sA: "Casual", sB: "Cajero" },
        { a: "sir", b: "answer", ipaA: "/sɝː/", ipaB: "/ˈæn.sɚ/", sA: "Señor", sB: "Respuesta" },
        { a: "third", b: "standard", ipaA: "/θɝːrd/", ipaB: "/ˈstæn.dɚd/", sA: "Tercero", sB: "Estándar" },
        { a: "burn", b: "butter", ipaA: "/bɝːrn/", ipaB: "/ˈbʌt̬.ɚ/", sA: "Quemar", sB: "Mantequilla" },
        { a: "nurse", b: "letter", ipaA: "/nɝːrs/", ipaB: "/ˈlet̬.ɚ/", sA: "Enfermera", sB: "Carta" },
        { a: "bird", b: "sugar", ipaA: "/bɝːrd/", ipaB: "/ˈʃʊɡ.ɚ/", sA: "Pájaro", sB: "Azúcar" }
    ];

    // Flexibilidad para el motor de voz
    const variants = {
        "berry": ["barry", "bury", "very"],
        "very": ["berry", "bury", "ferry"],
        "they": ["day", "the"],
        "sir": ["sure", "search"]
    };

    let idx = 0;
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const rec = Recognition ? new Recognition() : null;
    if(rec) { rec.lang = 'en-US'; rec.continuous = false; }

    function start() {
        if (!rec) return alert("Micro no compatible.");
        resetBoxes();
        try { rec.start(); } catch(e) {}
        const micBtn = document.getElementById('mic');
        micBtn.classList.add('listening-active');
        micBtn.innerText = "Escuchando... 🎤";
    }

    rec.onresult = (e) => {
        const heard = e.results[0][0].transcript.toLowerCase().trim();
        const wordA = data[idx].a.toLowerCase();
        const wordB = data[idx].b.toLowerCase();
        const fb = document.getElementById('feedback');

        const checkMatch = (input, target) => {
            if (input.includes(target)) return true;
            if (variants[target] && variants[target].some(v => input.includes(v))) return true;
            return false;
        };

        if (checkMatch(heard, wordA)) {
            document.getElementById('box1').classList.add('active');
            fb.innerHTML = `<span style="color:#00FF00">Entendí: "${data[idx].a}" ✅</span>`;
            showNext();
        } else if (checkMatch(heard, wordB)) {
            document.getElementById('box2').classList.add('active');
            fb.innerHTML = `<span style="color:#00FF00">Entendí: "${data[idx].b}" ✅</span>`;
            showNext();
        } else { fb.innerHTML = `<span style="color:#D30000">Escuché: "${heard}"... intenta de nuevo.</span>`; }
    };

    function showNext() { document.getElementById('next').classList.remove('hidden'); document.getElementById('skip').classList.add('hidden'); }
    rec.onend = () => { const micBtn = document.getElementById('mic'); micBtn.classList.remove('listening-active'); micBtn.innerText = "Presiona y Habla 🎤"; };
    function resetBoxes() { document.getElementById('box1').classList.remove('active'); document.getElementById('box2').classList.remove('active'); }

    function go() {
        idx++;
        if (idx < data.length) {
            document.getElementById('w1').innerText = data[idx].a.charAt(0).toUpperCase() + data[idx].a.slice(1);
            document.getElementById('w2').innerText = data[idx].b.charAt(0).toUpperCase() + data[idx].b.slice(1);
            document.getElementById('ipa1').innerText = data[idx].ipaA;
            document.getElementById('ipa2').innerText = data[idx].ipaB;
            document.getElementById('s1').innerText = data[idx].sA;
            document.getElementById('s2').innerText = data[idx].sB;
            
            document.getElementById('s1').classList.add('blur');
            document.getElementById('s2').classList.add('blur');
            
            resetBoxes();
            document.getElementById('counter').innerText = `${idx + 1} / ${data.length}`;
            document.getElementById('progress-bar').style.width = `${((idx + 1) / data.length) * 100}%`;
            document.getElementById('next').classList.add('hidden');
            document.getElementById('skip').classList.remove('hidden');
            document.getElementById('feedback').innerHTML = "Listo.";
        } else {
            document.getElementById('quiz-area').innerHTML = `<h2 style="color:#00FF00">¡RETO COMPLETADO!</h2><button class="btn-speak" onclick="location.reload()">REINICIAR</button>`;
        }
    }
    document.getElementById('progress-bar').style.width = `${((idx + 1) / data.length) * 100}%`;
</script>
</body>
</html>
